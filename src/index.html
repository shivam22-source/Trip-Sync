<!DOCTYPE html>
<html>

<head>
  <title>Socket Test</title>

  <style>
    body {
      font-family: Arial;
      padding: 20px;
    }

    #messages li {
      margin: 10px 0;
    }
  </style>
</head>

<body>

  <h1>Socket Test</h1>

  <!-- ROOM INPUT -->
  <input
    id="room"
    placeholder="Enter Trip ID"
  />

  <button id="joinBtn">
    Join Room
  </button>

  <hr />

  <!-- MESSAGE LIST -->
  <ul id="messages"></ul>

  <!-- MESSAGE FORM -->
  <form id="form">

    <input
      id="input"
      placeholder="Type message"
      autocomplete="off"
    />

    <button type="submit">
      Send
    </button>

  </form>


  <script src="http://localhost:5000/socket.io/socket.io.js"></script>

  <script>

    const socket = io("http://localhost:5000");

    const form =
      document.getElementById("form");

    const input =
      document.getElementById("input");

    const roomInput =
      document.getElementById("room");

    const messages =
      document.getElementById("messages");

    let currentRoom = "";


    // JOIN ROOM
    document
      .getElementById("joinBtn")
      .addEventListener("click", async () => {

        currentRoom = roomInput.value;

        socket.emit(
          "join-trip",
          currentRoom
        );

        console.log(
          "Joined:",
          currentRoom
        );

      });


    // RECEIVE MESSAGE
    socket.on(
      "receive-message",
      (data) => {

        const item =
          document.createElement("li");

        item.textContent =
          `${data.content}`;

        messages.appendChild(item);

      }
    );


    // SEND MESSAGE
    form.addEventListener(
      "submit",
      (e) => {

        e.preventDefault();

        if (input.value) {

          socket.emit(
            "send-message",
            {
              tripId: currentRoom,

              sender:
                "68251b60e754d8c894edfd8d",

              content:
                input.value,

              type: "text",
            }
          );

          input.value = "";

        }

      }
    );

  </script>

</body>

</html>
